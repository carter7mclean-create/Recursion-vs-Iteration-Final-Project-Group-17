<text x="1144.0" y="421.25" font-size="13" fill="#374151">safe through 100k; no overflow observed</text>
<text x="164" y="543.75" text-anchor="end" font-size="14" fill="#111827">Fast Exponentiation</text>
<rect x="180" y="509.35" width="950.0" height="58.8" rx="12" fill="#2563eb" opacity="0.9"/>
<text x="1144.0" y="543.75" font-size="13" fill="#374151">safe through 100k; no overflow observed</text>
