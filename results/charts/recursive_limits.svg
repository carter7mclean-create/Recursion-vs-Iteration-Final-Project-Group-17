<text x="275.0" y="624" text-anchor="middle" font-size="12" fill="#6b7280">10k</text>
<line x1="465.0" y1="110" x2="465.0" y2="600" stroke="#f3f4f6" stroke-width="1"/>
<text x="465.0" y="624" text-anchor="middle" font-size="12" fill="#6b7280">30k</text>
<line x1="655.0" y1="110" x2="655.0" y2="600" stroke="#f3f4f6" stroke-width="1"/>
