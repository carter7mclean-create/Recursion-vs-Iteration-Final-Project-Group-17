<text x="1130.0" y="624" text-anchor="middle" font-size="12" fill="#6b7280">100k</text>
<text x="164" y="176.25" text-anchor="end" font-size="14" fill="#111827">Fibonacci Sequence</text>
<rect x="180" y="141.85" width="285.0" height="58.8" rx="12" fill="#ea580c" opacity="0.9"/>
<text x="479.0" y="176.25" font-size="13" fill="#374151">safe through 30k; overflow at 50k</text>
